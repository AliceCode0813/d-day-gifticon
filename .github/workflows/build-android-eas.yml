name: Build Android APK (EAS)

on:
  workflow_dispatch:

jobs:
  build-apk-eas:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK on EAS
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Download APK
        run: eas build:download --platform android --latest --output dday-gifticon.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dday-gifticon-apk-eas
          path: dday-gifticon.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "### EAS Android APK ready" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **dday-gifticon-apk-eas** from Artifacts." >> "$GITHUB_STEP_SUMMARY"
