name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        working-directory: android
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dday-gifticon-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-v${{ github.run_number }}
          name: Android APK v${{ github.run_number }}
          body: |
            폰에서 **dday-gifticon.apk** 를 받아 설치하세요.
            (Expo Go 없이 독립 앱으로 실행됩니다.)
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true

      - name: Summary
        run: |
          echo "### Android APK ready" >> "$GITHUB_STEP_SUMMARY"
          echo "Download from [Releases](https://github.com/${{ github.repository }}/releases/latest) or Artifacts." >> "$GITHUB_STEP_SUMMARY"
