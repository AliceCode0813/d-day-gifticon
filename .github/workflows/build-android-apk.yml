name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build release APK
        env:
          CI: true
          EXPO_NO_TELEMETRY: 1
        run: npx expo run:android --variant release --no-install --no-bundler

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dday-gifticon-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          echo "### Android APK ready" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **dday-gifticon-apk** (app-release.apk) from Artifacts." >> "$GITHUB_STEP_SUMMARY"
